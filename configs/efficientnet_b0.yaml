experiment_name: "exp005_efficientnet_b0"

data:
  raw_dir: "data/raw"
  val_split: 0.15
  image_size: 128  # EfficientNet benefits from slightly higher resolution
  num_workers: 4

model:
  name: "efficientnet_b0"
  num_classes: 43
  pretrained: true

training:
  batch_size: 64
  epochs: 30       # Transfer learning might require more epochs for fine-tuning
  lr: 0.0005       # Lower learning rate for fine-tuning pretrained weights
  weight_decay: 0.0002
  early_stopping_patience: 8
  grad_clip: 2.0
  label_smoothing: 0.1
  seed: 42
  use_amp: true
