experiment_name: "exp010_efficientnet_v2_s"

data:
  raw_dir: "data/raw"
  val_split: 0.15
  image_size: 128
  num_workers: 4

model:
  name: "efficientnet_v2_s"
  num_classes: 43
  pretrained: true

training:
  batch_size: 64
  epochs: 30
  lr: 0.0005
  weight_decay: 0.0005
  early_stopping_patience: 12
  grad_clip: 2.0
  label_smoothing: 0.05
  seed: 42
  use_amp: true
  use_ema: true
  ema_decay: 0.999
  optimizer: "adamw"
  use_tensorboard: false
  mixup_alpha: 0.2
  mixup_prob: 0.5
